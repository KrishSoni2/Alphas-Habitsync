# Sahib Chawla - Docker Compose config
name: habitsync

services:
  app:
    build: ./app
    container_name: habitsync-web-app
    hostname: web-app
    volumes:
      - "./app/src:/appcode"
    environment:
      - WATCHPACK_POLLING=true
    ports:
      - 8501:8501
    depends_on:
      - api

  api:
    build: ./api
    container_name: habitsync-web-api
    hostname: web-api
    volumes:
      - "./api:/apicode"
    environment:
      - WATCHPACK_POLLING=true
    env_file:
      - ./api/.env
    ports:
      - 4000:4000
    depends_on:
      - db

  db:
    image: mysql:9
    container_name: habitsync-mysql-db
    hostname: db
    volumes:
      - "./database-files:/docker-entrypoint-initdb.d"
      - habitsync-db-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - 3200:3306

volumes:
  habitsync-db-data:
